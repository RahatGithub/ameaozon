{% extends 'base.html' %}

{% block title %}Admin Login | Ameaozon{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-72px)] flex items-center justify-center px-4 sm:px-6 py-12 bg-ink-900">

  <div class="w-full max-w-sm" data-aos="fade-up">

    <div class="text-center mb-8">
      <div class="mx-auto w-14 h-14 rounded-2xl bg-white/10 text-white inline-flex items-center justify-center mb-4">
        <i class="fas fa-shield-halved text-xl"></i>
      </div>
      <h1 class="font-display text-2xl font-extrabold text-white">Admin Access</h1>
      <p class="text-ink-400 text-sm mt-1">Authorized personnel only</p>
    </div>

    <div class="bg-ink-800 rounded-2xl ring-1 ring-white/10 p-6 sm:p-8">
      <form method="post" class="space-y-5">
        {% csrf_token %}

        <div>
          <label for="id_username" class="block text-sm font-medium text-ink-300 mb-1.5">Username</label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-ink-500"><i class="fas fa-user text-sm"></i></span>
            <input type="text" name="username" id="id_username" required
                   class="w-full pl-10 pr-4 py-3 rounded-xl bg-ink-700 border border-ink-600 text-sm font-medium text-white placeholder-ink-500 outline-none focus:bg-ink-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition"
                   placeholder="Enter your username">
          </div>
        </div>

        <div>
          <label for="id_password" class="block text-sm font-medium text-ink-300 mb-1.5">Password</label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-ink-500"><i class="fas fa-lock text-sm"></i></span>
            <input type="password" name="password" id="id_password" required autocomplete="off"
                   class="w-full pl-10 pr-11 py-3 rounded-xl bg-ink-700 border border-ink-600 text-sm font-medium text-white placeholder-ink-500 outline-none focus:bg-ink-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 transition"
                   placeholder="Enter your password">
            <button type="button" onclick="togglePassword('id_password', this)" class="absolute right-3.5 top-1/2 -translate-y-1/2 bg-transparent border-none p-0 cursor-pointer text-ink-500 hover:text-ink-300 transition focus:outline-none" tabindex="-1">
              <i class="fas fa-eye text-sm"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="w-full inline-flex items-center justify-center gap-2 px-6 py-3.5 rounded-full bg-brand-500 hover:bg-brand-600 text-white font-semibold shadow-glow transition">
          <i class="fas fa-right-to-bracket text-sm"></i> Sign In
        </button>
      </form>

      <div class="mt-6 pt-5 border-t border-white/10 text-center">
        <p class="text-sm text-ink-500">Not an admin? <a href="{% url 'accounts:login' %}" class="font-semibold text-brand-500 hover:text-brand-400 transition">User login</a></p>
      </div>
    </div>

  </div>
</div>

<script>
function togglePassword(inputId, btn) {
  const input = document.getElementById(inputId);
  const icon = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}
</script>
{% endblock %}
