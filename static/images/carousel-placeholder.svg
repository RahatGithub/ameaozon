<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="950" cy="100" r="180" fill="#f97316" opacity="0.06"/>
  <circle cx="1050" cy="320" r="120" fill="#fb923c" opacity="0.05"/>
  <circle cx="200" cy="380" r="100" fill="#f97316" opacity="0.04"/>
  <!-- Paw icon -->
  <g transform="translate(540, 120)" fill="#f97316" opacity="0.12">
    <circle cx="60" cy="0" r="22"/>
    <circle cx="0" cy="30" r="22"/>
    <circle cx="120" cy="30" r="22"/>
    <ellipse cx="60" cy="80" rx="50" ry="40"/>
  </g>
  <!-- Text -->
  <text x="600" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="white">Welcome to Ameaozon</text>
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8">Premium pet supplies delivered with love</text>
  <!-- Accent bar -->
  <rect x="550" y="300" width="100" height="4" rx="2" fill="url(#accent)"/>
</svg>
