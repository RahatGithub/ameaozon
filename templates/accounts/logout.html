{% extends 'base.html' %}

{% block title %}Logged Out | Ameaozon{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 sm:px-6 py-16">

  <div class="bg-white rounded-3xl ring-1 ring-ink-100 shadow-card text-center p-8 sm:p-12" data-aos="zoom-in">
    <div class="mx-auto w-20 h-20 rounded-full bg-brand-50 text-brand-500 inline-flex items-center justify-center mb-5">
      <i class="fas fa-hand-wave text-3xl"></i>
    </div>
    <h1 class="font-display text-3xl font-extrabold text-ink-900">See you soon!</h1>
    <p class="text-ink-500 mt-3 max-w-sm mx-auto">You've been logged out successfully. Thank you for visiting Ameaozon Pet Shop!</p>

    <div class="mt-8 flex flex-wrap items-center justify-center gap-3">
      <a href="{% url 'accounts:login' %}" class="inline-flex items-center gap-2 px-6 py-3 rounded-full bg-brand-500 hover:bg-brand-600 text-white font-semibold shadow-glow transition">
        <i class="fas fa-sign-in-alt text-sm"></i> Log In Again
      </a>
      <a href="{% url 'store:home' %}" class="inline-flex items-center gap-2 px-6 py-3 rounded-full bg-white ring-1 ring-ink-200 hover:ring-brand-400 text-ink-700 hover:text-brand-600 font-semibold transition">
        <i class="fas fa-home text-sm"></i> Return to Home
      </a>
    </div>
  </div>
</div>
{% endblock %}
