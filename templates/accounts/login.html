{% extends 'base.html' %}

{% block title %}Login | Ameaozon{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 sm:px-6 py-12">

  <div class="text-center mb-8" data-aos="fade-up">
    <div class="mx-auto w-16 h-16 rounded-full bg-brand-50 text-brand-500 inline-flex items-center justify-center mb-4">
      <i class="fas fa-paw text-2xl"></i>
    </div>
    <h1 class="font-display text-3xl font-extrabold text-ink-900">Welcome back</h1>
    <p class="text-ink-500 mt-1">Sign in to your Ameaozon account</p>
  </div>

  <div class="bg-white rounded-2xl ring-1 ring-ink-100 shadow-card p-6 sm:p-8" data-aos="fade-up" data-aos-delay="50">
    <form method="post" class="space-y-5">
      {% csrf_token %}

      <div>
        <label for="id_username" class="block text-sm font-medium text-ink-700 mb-1.5">Username</label>
        <div class="relative">
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-ink-400"><i class="fas fa-user text-sm"></i></span>
          <input type="text" name="username" id="id_username" required
                 class="w-full pl-10 pr-4 py-3 rounded-xl bg-ink-50 border border-ink-200 text-sm font-medium text-ink-900 outline-none focus:bg-white focus:border-brand-400 focus:ring-2 focus:ring-brand-200 transition"
                 placeholder="Enter your username">
        </div>
      </div>

      <div>
        <label for="id_password" class="block text-sm font-medium text-ink-700 mb-1.5">Password</label>
        <div class="relative">
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-ink-400"><i class="fas fa-lock text-sm"></i></span>
          <input type="password" name="password" id="id_password" required
                 class="w-full pl-10 pr-4 py-3 rounded-xl bg-ink-50 border border-ink-200 text-sm font-medium text-ink-900 outline-none focus:bg-white focus:border-brand-400 focus:ring-2 focus:ring-brand-200 transition"
                 placeholder="Enter your password">
        </div>
      </div>

      <button type="submit" class="w-full inline-flex items-center justify-center gap-2 px-6 py-3.5 rounded-full bg-brand-500 hover:bg-brand-600 text-white font-semibold shadow-glow transition">
        <i class="fas fa-sign-in-alt text-sm"></i> Sign In
      </button>
    </form>

    <div class="mt-6 pt-6 border-t border-ink-100 text-center">
      <p class="text-sm text-ink-500">Don't have an account? <a href="{% url 'accounts:register' %}" class="font-semibold text-brand-600 hover:text-brand-700 transition">Create one</a></p>
    </div>
  </div>
</div>
{% endblock %}
